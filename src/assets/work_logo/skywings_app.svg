<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="300" fill="#0f172a" />
  
  <!-- Subtle Grid -->
  <path d="M0 50 H400 M0 100 H400 M0 150 H400 M0 200 H400 M0 250 H400 M50 0 V300 M100 0 V300 M150 0 V300 M200 0 V300 M250 0 V300 M300 0 V300 M350 0 V300" stroke="#1e293b" stroke-width="2" />
  
  <!-- Logo mark -->
  <g transform="translate(200, 120)">
    <!-- Wings / S shape -->
    <path d="M -40 -30 C -20 -50 20 -50 40 -30 C 50 -20 60 -10 60 0 C 60 30 20 40 -20 50 C -40 55 -60 40 -40 20 Z" fill="url(#wingGradient)" />
    <!-- Center circle -->
    <circle cx="0" cy="10" r="15" fill="#ffffff" />
  </g>
  
  <defs>
    <linearGradient id="wingGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#818cf8" />
    </linearGradient>
  </defs>

  <!-- Text -->
  <text x="200" y="220" font-family="sans-serif" font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle">Skywings NextGen</text>
  <text x="200" y="250" font-family="sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">Corporate Website</text>
</svg>
